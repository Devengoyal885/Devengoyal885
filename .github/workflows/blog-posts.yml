name: Latest Blog Posts

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://hashnode.com/@devengoyal/rss"
          max_post_count: 5
          template: "<tr><td><a href='$url'><b>$title</b></a></td><td>$date</td></tr>"
